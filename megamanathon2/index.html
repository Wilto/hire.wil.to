  <body>
    <div class="container">
      <div class="screen">
        <main>
          <div class="wrapper">
            <div class="body">
              <h1 class="hed">Megamanathon 2</h1>
              <p class="type">Get your weapons ready!</p>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      !window.matchMedia( '(prefers-reduced-motion: reduce)' ).matches && (() => {
        const type = document.querySelector(".type");
        const text = type.innerText.split("").reverse();
        const typer = () => {
          setInterval( () => {
            if( text.length ) {
              type.append( text.pop() );
            } else {
              return false;
            }
          }, 150 );
        };
        type.innerHTML = "";

        setTimeout( typer, 5000 );
      })();
    </script>
  </body>
